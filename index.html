<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>抓阄抽人</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #f7f4ff, #eef7ff);
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: min(680px, 100%);
      background: rgba(255, 255, 255, 0.95);
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(79, 70, 229, 0.16);
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 20px;
      color: #6b7280;
      text-align: center;
      line-height: 1.7;
      font-size: 15px;
    }

    .notice {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      padding: 12px 14px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .inputs {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }

    input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.12);
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 15px 18px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22);
    }

    button.secondary {
      color: #4f46e5;
      background: #eef2ff;
      box-shadow: none;
    }

    .result-box {
      margin-top: 22px;
      padding: 20px;
      border-radius: 22px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      min-height: 120px;
    }

    .result-title {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 14px;
      text-align: center;
    }

    .winner-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .winner {
      padding: 24px 12px;
      border-radius: 20px;
      background: #f5f3ff;
      border: 1px solid #ddd6fe;
      color: #5b21b6;
      font-size: 26px;
      font-weight: 900;
      text-align: center;
      animation: pop 0.35s ease;
    }

    .empty {
      color: #9ca3af;
      text-align: center;
      padding: 28px 0;
      line-height: 1.7;
    }

    .all-names {
      margin-top: 14px;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.7;
      text-align: center;
    }

    @keyframes pop {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 520px) {
      .card { padding: 22px; }
      h1 { font-size: 28px; }
      .buttons, .winner-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>抓阄抽人</h1>
    <p class="subtitle">输入 5 位参与者，随机抽出 2 人。</p>

    <div class="notice">
      这个版本不依赖 Firebase 或 Google 服务，国内网络更容易打开。参与者可以通过链接打开页面；主持人把 5 个人名字填进去后抽取。
    </div>

    <section class="inputs" aria-label="参与者名单">
      <input id="name1" type="text" placeholder="参与者 1" />
      <input id="name2" type="text" placeholder="参与者 2" />
      <input id="name3" type="text" placeholder="参与者 3" />
      <input id="name4" type="text" placeholder="参与者 4" />
      <input id="name5" type="text" placeholder="参与者 5" />
    </section>

    <section class="buttons">
      <button onclick="drawLots()">开始抓阄</button>
      <button class="secondary" onclick="resetPage()">清空重来</button>
    </section>

    <section class="result-box">
      <div class="result-title">抽中结果</div>
      <div id="result" class="empty">结果会显示在这里</div>
      <div id="allNames" class="all-names"></div>
    </section>
  </main>

  <script>
    function drawLots() {
      const names = [1, 2, 3, 4, 5]
        .map(i => document.getElementById(`name${i}`).value.trim())
        .filter(Boolean);

      const uniqueNames = [...new Set(names)];
      const result = document.getElementById("result");
      const allNames = document.getElementById("allNames");

      if (uniqueNames.length !== 5) {
        result.className = "empty";
        result.innerHTML = "请填写 5 个不重复的参与者名字。";
        allNames.textContent = "";
        return;
      }

      const winners = shuffle(uniqueNames).slice(0, 2);

      result.className = "winner-list";
      result.innerHTML = winners
        .map(name => `<div class="winner">🎉 ${escapeHTML(name)}</div>`)
        .join("");

      allNames.textContent = `本次参与者：${uniqueNames.join("、")}`;
    }

    function resetPage() {
      [1, 2, 3, 4, 5].forEach(i => {
        document.getElementById(`name${i}`).value = "";
      });
      const result = document.getElementById("result");
      result.className = "empty";
      result.innerHTML = "结果会显示在这里";
      document.getElementById("allNames").textContent = "";
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function escapeHTML(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
